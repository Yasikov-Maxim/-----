<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личные сообщения</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 10px; }
        
        /* Стили шапки */
        .auth-bar { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #007bfc; }
        .logout-link { color: #ff4757; cursor: pointer; font-size: 12px; font-weight: bold; }

        /* Список контактов */
        .contacts { display: flex; gap: 15px; margin-top: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: thin; }
        .contact-item { text-align: center; cursor: pointer; min-width: 70px; transition: 0.2s; }
        .contact-item:hover { transform: translateY(-2px); }
        .contact-avatar { width: 50px; height: 50px; border-radius: 50%; background: #eee; border: 2px solid transparent; object-fit: cover; }
        .contact-item.active .contact-avatar { border-color: #007bfc; }

        /* Окно чата */
        #chatBox { height: 350px; overflow-y: auto; border: 1px solid #f0f0f0; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .msg.received { align-self: flex-start; background: #ffffff; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .msg.sent { align-self: flex-end; background: #007bfc; color: white; }

        /* Поле ввода */
        .input-area { display: flex; gap: 10px; margin-top: 10px; }
        input { flex: 1; padding: 12px 18px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        .send-btn { background: #007bfc; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="container" id="authSection">
    <button id="loginBtn" style="width:100%; padding: 12px; background: #007bfc; color:white; border:none; border-radius: 8px; cursor:pointer;">Войти через Google</button>
    <div id="userInfo" class="auth-bar" style="display: none;">
        <div class="user-info">
            <img id="userPhoto" class="user-avatar-img" src="" alt="">
            <div>
                <div id="userName" style="font-weight: bold; font-size: 14px;"></div>
                <span id="logoutBtn" class="logout-link">Выйти</span>
            </div>
        </div>
    </div>
</div>

<div id="messenger" class="container" style="display: none;">
    <p style="font-size: 13px; color: #666; margin-bottom: 10px;">Выберите собеседника:</p>
    <div class="contacts" id="contactsList">
        </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 15px 0;">
    <h4 id="chatTitle" style="margin: 0 0 10px 0; color: #333;">Выберите, кому написать</h4>
    
    <div id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Введите сообщение...">
        <button id="sendBtn" class="send-btn">➤</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, addDoc, query, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAtIo0yCCK7N9RivQ3ThPOJPzBNwZkvM3g",
        authDomain: "registering-a-web-application.firebaseapp.com",
        projectId: "registering-a-web-application",
        storageBucket: "registering-a-web-application.firebasestorage.app",
        messagingSenderId: "421808358341",
        appId: "1:421808358341:web:99b9682a26f9e8b68d81ac"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentRecipientId = null;
    let unsubscribeMessages = null;

    // --- АВТОРИЗАЦИЯ И СОХРАНЕНИЕ ПРОФИЛЯ ---
    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('messenger').style.display = 'block';
            document.getElementById('userName').innerText = user.displayName;
            document.getElementById('userPhoto').src = user.photoURL;

            // РЕГИСТРАЦИЯ: сохраняем юзера в коллекцию /users
            await setDoc(doc(db, "users", user.uid), {
                uid: user.uid,
                name: user.displayName,
                photo: user.photoURL,
                lastSeen: serverTimestamp()
            }, { merge: true });

            loadContacts();
        } else {
            document.getElementById('loginBtn').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('messenger').style.display = 'none';
        }
    });

    // --- ЗАГРУЗКА СПИСКА ПОЛЬЗОВАТЕЛЕЙ ---
    function loadContacts() {
        onSnapshot(collection(db, "users"), (snapshot) => {
            const list = document.getElementById('contactsList');
            list.innerHTML = "";
            snapshot.forEach((userDoc) => {
                const data = userDoc.data();
                if (data.uid === auth.currentUser.uid) return; // Пропускаем себя

                const item = document.createElement('div');
                item.className = 'contact-item';
                item.onclick = () => selectContact(data.name, data.uid, item);
                item.innerHTML = `
                    <img src="${data.photo}" class="contact-avatar">
                    <div style="font-size: 11px; margin-top:4px;">${data.name.split(' ')[0]}</div>
                `;
                list.appendChild(item);
            });
        });
    }

    // --- ВЫБОР СОБЕСЕДНИКА ---
    window.selectContact = (name, id, element) => {
        currentRecipientId = id;
        document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
        element.classList.add('active');
        document.getElementById('chatTitle').innerText = "Чат с: " + name;
        loadMessages(id);
    };

    // --- ЗАГРУЗКА СООБЩЕНИЙ ---
    function loadMessages(recipientId) {
        if (unsubscribeMessages) unsubscribeMessages();

        // Запрос: сообщения где (я отправил тебе) ИЛИ (ты отправил мне)
        // Для простоты используем chatKey как в прошлом примере или фильтр по двум полям
        const q = query(
            collection(db, "messages"),
            where("pair", "in", [
                `${auth.currentUser.uid}_${recipientId}`,
                `${recipientId}_${auth.currentUser.uid}`
            ]),
            orderBy("timestamp", "asc")
        );

        unsubscribeMessages = onSnapshot(q, (snapshot) => {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = "";
            snapshot.forEach((mDoc) => {
                const m = mDoc.data();
                const isMine = m.from === auth.currentUser.uid;
                chatBox.innerHTML += `<div class="msg ${isMine ? 'sent' : 'received'}">${m.text}</div>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    // --- ОТПРАВКА ---
    document.getElementById('sendBtn').onclick = async () => {
        const text = document.getElementById('msgInput').value;
        if (!text || !currentRecipientId) return;

        await addDoc(collection(db, "messages"), {
            from: auth.currentUser.uid,
            to: currentRecipientId,
            pair: `${auth.currentUser.uid}_${currentRecipientId}`,
            text: text,
            timestamp: serverTimestamp()
        });
        document.getElementById('msgInput').value = "";
    };
</script>
</body>
</html>
