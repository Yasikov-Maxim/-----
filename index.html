<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личные сообщения</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 10px; }
        
        /* Стили шапки */
        .auth-bar { display: flex; align-items: center; justify-content: space-between; width: 100%; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #4caf50; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .logout-link { color: red; cursor: pointer; font-size: 12px; text-decoration: none; display: block; }

        /* Список контактов */
        .contacts { display: flex; gap: 15px; margin-top: 10px; overflow-x: auto; padding-bottom: 10px; }
        .contact-item { text-align: center; cursor: pointer; min-width: 60px; }
        .contact-avatar { width: 45px; height: 45px; border-radius: 50%; background: #00bcd4; color: white; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; font-size: 18px; }
        .contact-item.active .contact-avatar { border: 3px solid #007bfc; }

        /* Окно чата */
        #chatBox { height: 350px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fff; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 14px; position: relative; }
        .msg.received { align-self: flex-start; background: #e9ecef; color: #333; }
        .msg.sent { align-self: flex-end; background: #007bfc; color: white; }

        /* Поле ввода */
        .input-area { display: flex; gap: 10px; margin-top: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .send-btn { background: #007bfc; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

<div class="container" id="authSection">
    <button id="loginBtn" style="width:100%; padding: 10px;">Войти через Google</button>
    <div id="userInfo" class="auth-bar" style="display: none;">
        <div class="user-info">
            <div id="userPhoto" class="user-avatar">?</div>
            <div>
                <div id="userName" style="font-weight: bold; font-size: 14px;"></div>
                <span id="logoutBtn" class="logout-link">Выйти</span>
            </div>
        </div>
    </div>
</div>

<div id="messenger" class="container" style="display: none;">
    <p style="font-size: 13px; color: #666;">Выберите собеседника:</p>
    <div class="contacts" id="contactsList">
        <div class="contact-item" onclick="selectContact('Almas', 'almas_id_123')">
            <div class="contact-avatar">A</div>
            <span style="font-size: 12px;">Алмас</span>
        </div>
    </div>

    <hr style="border: 0.5px solid #eee; margin: 15px 0;">
    <h4 id="chatTitle">Чат: выберите контакт</h4>
    
    <div id="chatBox">
        </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Ваше сообщение...">
        <button id="sendBtn" class="send-btn">➤</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, serverTimestamp, or, and } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAtIo0yCCK7N9RivQ3ThPOJPzBNwZkvM3g",
        authDomain: "registering-a-web-application.firebaseapp.com",
        projectId: "registering-a-web-application",
        storageBucket: "registering-a-web-application.firebasestorage.app",
        messagingSenderId: "421808358341",
        appId: "1:421808358341:web:99b9682a26f9e8b68d81ac"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentRecipientId = null;
    let unsubscribe = null;

    // Авторизация
    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('authSection').style.display = 'block';
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('messenger').style.display = 'block';
            document.getElementById('userName').innerText = user.displayName;
            document.getElementById('userPhoto').innerText = user.displayName[0];
        } else {
            document.getElementById('loginBtn').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('messenger').style.display = 'none';
        }
    });

    // Выбор контакта
    window.selectContact = (name, id) => {
        currentRecipientId = id;
        document.getElementById('chatTitle').innerText = "Чат с: " + name;
        loadMessages(id);
    };

    // Загрузка сообщений (Фильтр: (Я -> Он) ИЛИ (Он -> Я))
    function loadMessages(recipientId) {
        if (unsubscribe) unsubscribe();

        const q = query(
            collection(db, "messages"),
            where("chatKey", "in", [
                `${auth.currentUser.uid}_${recipientId}`,
                `${recipientId}_${auth.currentUser.uid}`
            ]),
            orderBy("timestamp", "asc")
        );

        unsubscribe = onSnapshot(q, (snapshot) => {
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const isMine = data.senderId === auth.currentUser.uid;
                const div = document.createElement('div');
                div.className = `msg ${isMine ? 'sent' : 'received'}`;
                div.innerText = data.text;
                chatBox.appendChild(div);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    // Отправка сообщения
    document.getElementById('sendBtn').onclick = async () => {
        const text = document.getElementById('msgInput').value;
        if (!text || !currentRecipientId) return;

        await addDoc(collection(db, "messages"), {
            senderId: auth.currentUser.uid,
            receiverId: currentRecipientId,
            chatKey: `${auth.currentUser.uid}_${currentRecipientId}`, // Ключ для фильтрации
            text: text,
            timestamp: serverTimestamp()
        });

        document.getElementById('msgInput').value = "";
    };
</script>
</body>
</html>
